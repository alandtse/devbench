# PR title lint: devbench uses Conventional Commits, and PRs are squash-merged, so
# the PR title becomes the commit subject. Validate it the same way Open Shaders does.
name: "PR: Lint"

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

jobs:
  title:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
