# Nexus upload for devbench. devbench ships a single .zip (no AIO/feature matrix),
# so this is a lean wrapper around the shared reusable workflow
# alandtse/nexus-workflows/.github/workflows/upload-nexus.yml — the same one Open
# Shaders uses. The reusable workflow downloads the release's .zip by tag, checks
# whether the version already exists on Nexus, and uploads if new.
#
# Safety: dry_run defaults to true (report only, never uploads). A real upload needs
# (1) the devbench Nexus page's mod ID, and (2) repo secrets UNEX_APIKEY and
# UNEX_NEXUSMODS_SESSION_COOKIE configured — then dispatch with dry_run=false.
name: "Nexus: Upload Release"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Published stable release tag to upload (vX.Y.Z)."
        required: true
      nexus_game_id:
        description: "Nexus game ID."
        required: false
        default: "skyrimspecialedition"
      nexus_mod_id:
        description: "devbench Nexus mod ID. Required for a real (non-dry-run) upload."
        required: false
        default: ""
      mod_filename:
        description: "Nexus file name (without extension)."
        required: false
        default: "devbench"
      dry_run:
        description: "If true, only report the planned upload; never upload."
        required: false
        type: choice
        default: "true"
        options: ["true", "false"]
      changelog:
        description: "Optional changelog; defaults to the GitHub release body."
        required: false
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      nexus_game_id:
        required: false
        type: string
        default: "skyrimspecialedition"
      nexus_mod_id:
        required: false
        type: string
        default: ""
      mod_filename:
        required: false
        type: string
        default: "devbench"
      dry_run:
        required: false
        type: string
        default: "true"
      changelog:
        required: false
        type: string
        default: ""
    secrets:
      UNEX_NEXUSMODS_SESSION_COOKIE:
        required: false
      UNEX_APIKEY:
        required: false

# Read-only on GitHub: jobs list/download the release and write only to Nexus.
permissions:
  contents: read

jobs:
  prepare:
    name: Resolve release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
      mod_id: ${{ steps.resolve.outputs.mod_id }}
      changelog: ${{ steps.body.outputs.changelog }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_MOD_ID: ${{ inputs.nexus_mod_id }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$INPUT_TAG"
          [ -n "$TAG" ] || { echo "::error::No tag provided." >&2; exit 1; }
          # Nexus only gets stable releases.
          if [[ "$TAG" == *-* ]]; then
            echo "::error::'$TAG' is a pre-release tag; only stable releases go to Nexus." >&2
            exit 1
          fi
          DRAFT=$(gh api "repos/$GITHUB_REPOSITORY/releases" \
            --jq ".[] | select(.tag_name == \"$TAG\") | .draft" 2>/dev/null | head -1)
          if [ "$DRAFT" != "false" ]; then
            echo "::error::Release '$TAG' is not published. Publish the GitHub release first." >&2
            exit 1
          fi
          DRY_RUN=$([ "$INPUT_DRY_RUN" = "false" ] && echo false || echo true)
          if [ -z "$INPUT_MOD_ID" ] && [ "$DRY_RUN" = "false" ]; then
            echo "::error::nexus_mod_id is required for a real upload." >&2
            exit 1
          fi
          [ -n "$INPUT_MOD_ID" ] || echo "::warning::nexus_mod_id is empty — dry-run only."
          {
            echo "tag=$TAG"
            echo "version=${TAG#v}"
            echo "dry_run=$DRY_RUN"
            echo "mod_id=$INPUT_MOD_ID"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve changelog (release body)
        id: body
        env:
          INPUT_CHANGELOG: ${{ inputs.changelog }}
          TAG: ${{ steps.resolve.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "changelog<<$DELIM"
            if [ -n "$INPUT_CHANGELOG" ]; then
              printf '%s\n' "$INPUT_CHANGELOG"
            else
              gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq '.body // ""' 2>/dev/null || true
            fi
            echo "$DELIM"
          } >> "$GITHUB_OUTPUT"

  dry-run-check:
    name: Dry run — check Nexus versions
    needs: prepare
    if: needs.prepare.outputs.dry_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Query Nexus for existing versions
        env:
          MOD_ID: ${{ needs.prepare.outputs.mod_id }}
          VERSION: ${{ needs.prepare.outputs.version }}
          NEXUS_GAME_ID: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
          MOD_FILENAME: ${{ inputs.mod_filename || 'devbench' }}
          UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, urllib.request, urllib.error

          mod_id = os.environ.get('MOD_ID', '')
          version = os.environ.get('VERSION', '')
          game_id = os.environ.get('NEXUS_GAME_ID', 'skyrimspecialedition')
          api_key = os.environ.get('UNEX_APIKEY', '')
          label = os.environ.get('MOD_FILENAME', 'devbench')
          summary = open(os.environ['GITHUB_STEP_SUMMARY'], 'a')

          def w(line=''):
              print(line)
              summary.write(line + '\n')

          w('## Dry Run — Nexus Version Check')
          w()
          if not api_key:
              w('> **Warning:** UNEX_APIKEY is not set — cannot query Nexus.')
              w()
          if not mod_id:
              w('> **Warning:** nexus_mod_id is empty — nothing to check. '
                'Set it (and the UNEX_* secrets) for a real upload.')
              summary.close()
              raise SystemExit(0)

          url = f'https://www.nexusmods.com/{game_id}/mods/{mod_id}'
          link = f'[{label}]({url})'
          w('| Mod | Planned | Status | Versions on Nexus |')
          w('|-----|---------|--------|-------------------|')
          if not api_key:
              w(f'| {link} | `{version}` | ⚠️ skipped | — |')
              summary.close()
              raise SystemExit(0)

          api_url = f'https://api.nexusmods.com/v1/games/{game_id}/mods/{mod_id}/files.json'
          req = urllib.request.Request(api_url, headers={
              'apikey': api_key,
              'User-Agent': 'devbench-ci/1.0',
              'Accept': 'application/json',
          })
          try:
              with urllib.request.urlopen(req, timeout=15) as resp:
                  files = json.load(resp).get('files', [])
              main = [f for f in files if f.get('category_name') == 'MAIN']
              check = main if main else files
              seen = []
              for f in check:
                  v = f.get('version', '')
                  if v and v not in seen:
                      seen.append(v)
              versions_str = ', '.join(f'`{v}`' for v in seen[-5:]) or '—'
              status = '✅ exists (would skip)' if version in seen else '🆕 new'
              w(f'| {link} | `{version}` | {status} | {versions_str} |')
              w()
              w('> ✓ UNEX_APIKEY validated.')
          except urllib.error.HTTPError as e:
              err = {401: '❌ auth failed', 403: '❌ forbidden'}.get(e.code, f'❌ HTTP {e.code}')
              w(f'| {link} | `{version}` | {err} | — |')
          except Exception:
              w(f'| {link} | `{version}` | ❌ error | — |')
          summary.close()
          PYEOF

  upload:
    name: Upload to Nexus
    needs: prepare
    if: needs.prepare.outputs.dry_run != 'true'
    uses: alandtse/nexus-workflows/.github/workflows/upload-nexus.yml@main
    with:
      nexus_game_id: ${{ inputs.nexus_game_id || 'skyrimspecialedition' }}
      nexus_mod_id: ${{ needs.prepare.outputs.mod_id }}
      tag_name: ${{ needs.prepare.outputs.tag }}
      mod_version: ${{ needs.prepare.outputs.version }}
      mod_filename: ${{ inputs.mod_filename || 'devbench' }}
      changelog: ${{ needs.prepare.outputs.changelog }}
      file_description: "devbench ${{ needs.prepare.outputs.version }} — SKSE MCP/REST test bench. See changelog."
      check_existing: true
    secrets:
      UNEX_NEXUSMODS_SESSION_COOKIE: ${{ secrets.UNEX_NEXUSMODS_SESSION_COOKIE }}
      UNEX_APIKEY: ${{ secrets.UNEX_APIKEY }}
