# pre-commit.ci writes these messages as both the commit subject and the PR
# title. Keep them Conventional Commits so the "Validate PR title" check passes
# without manual renaming.
ci:
  autoupdate_commit_msg: "ci: pre-commit autoupdate"
  autofix_commit_msg: "style: auto fixes from pre-commit.com hooks"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # xmake-requires.lock is machine-generated by xmake without a trailing
      # newline; let these hooks "fix" it and every dep update re-breaks CI.
      # default_recordings/ holds machine-generated benchmark trajectories —
      # large, dense, and not meant to be hand-edited or reformatted.
      - id: trailing-whitespace
        exclude: ^(xmake-requires\.lock$|default_recordings/)
      - id: end-of-file-fixer
        exclude: ^(xmake-requires\.lock$|default_recordings/)
      - id: check-yaml
      - id: check-added-large-files
        exclude: ^default_recordings/

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        # Restrict to C/C++; clang-format v21 errors on JSON without a Json
        # language section, and JSON is already handled by prettier below.
        types_or: [c, c++]

  - repo: https://github.com/JohnnyMorganz/stylua
    rev: v2.5.2
    hooks:
      - id: stylua
        args: ["--config-path", "stylua.toml"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, markdown, json]
        exclude: ^default_recordings/
