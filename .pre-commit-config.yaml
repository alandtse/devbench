repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # xmake-requires.lock is machine-generated by xmake without a trailing
      # newline; let these hooks "fix" it and every dep update re-breaks CI.
      - id: trailing-whitespace
        exclude: ^xmake-requires\.lock$
      - id: end-of-file-fixer
        exclude: ^xmake-requires\.lock$
      - id: check-yaml
      - id: check-added-large-files

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.5
    hooks:
      - id: clang-format
        # Restrict to C/C++; clang-format v21 errors on JSON without a Json
        # language section, and JSON is already handled by prettier below.
        types_or: [c, c++]

  - repo: https://github.com/JohnnyMorganz/stylua
    rev: v2.5.2
    hooks:
      - id: stylua
        args: ["--config-path", "stylua.toml"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, markdown, json]
